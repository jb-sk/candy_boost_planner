# ポケモンマスターデータ自動更新ワークフロー
# Wikiをチェックして新規ポケモンがあればPRを自動作成
name: Auto Update Pokemon Data

on:
  schedule:
    # 毎日 UTC 01:00 (JST 10:00) に実行（毎月1日はコード内分岐で全件チェック）
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      refresh_en_names:
        description: 'Re-fetch all English names from PokeAPI'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pokemon-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for master data changes
        id: master_check
        run: |
          echo "=== マスターデータ差分確認 ==="
          OUTPUT=$(npm run generate:master -- --non-interactive --dry-run 2>&1 || true)
          echo "$OUTPUT"

          # 追加があるかチェック
          if echo "$OUTPUT" | grep -q "追加: 0"; then
            echo "has_master_changes=false" >> $GITHUB_OUTPUT
            echo "マスターデータ変更なし"
          else
            echo "has_master_changes=true" >> $GITHUB_OUTPUT
            echo "マスターデータ変更あり"
          fi

          # サマリーを保存（追加/削除の差分情報を抽出）
          echo 'master_summary<<EOF' >> $GITHUB_OUTPUT
          echo "$OUTPUT" | grep -E "^(\[追加される|\[削除される|  [+-] #)" | head -50 >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Clone pokesleep-tool for form verification
        if: steps.master_check.outputs.has_master_changes == 'true'
        run: |
          git clone --depth 1 https://github.com/nitoyon/pokesleep-tool.git /tmp/pokesleep-tool
          echo "pokesleep-tool cloned to /tmp/pokesleep-tool"

      - name: Verify and auto-fix form mapping
        if: steps.master_check.outputs.has_master_changes == 'true'
        id: form_verify
        run: |
          echo "=== フォーム番号突合 & 自動修正 ==="
          VERIFY_OUTPUT=$(node scripts/verify-form-mapping.mjs --pokesleep-tool /tmp/pokesleep-tool 2>&1) || true
          echo "$VERIFY_OUTPUT"

          # 自動修正件数を取得
          FIXES=$(echo "$VERIFY_OUTPUT" | grep -oP '(?<=fixes=)\d+' || echo "0")
          UNFIXABLE=$(echo "$VERIFY_OUTPUT" | grep -oP '(?<=unfixable=)\d+' || echo "0")
          SKIPPED=$(echo "$VERIFY_OUTPUT" | grep -q 'skipped=true' && echo "true" || echo "false")

          echo "form_fixes=$FIXES" >> $GITHUB_OUTPUT
          echo "form_unfixable=$UNFIXABLE" >> $GITHUB_OUTPUT
          echo "form_skipped=$SKIPPED" >> $GITHUB_OUTPUT

          if [ "$UNFIXABLE" != "0" ]; then
            echo "form_errors=true" >> $GITHUB_OUTPUT
          else
            echo "form_errors=false" >> $GITHUB_OUTPUT
          fi

          # PRセクションを動的構築（スキップ時は空）
          if [ "$SKIPPED" = "true" ]; then
            echo 'form_pr_section=' >> $GITHUB_OUTPUT
          else
            echo 'form_pr_section<<FORMSECTION' >> $GITHUB_OUTPUT
            echo '### フォーム番号突合' >> $GITHUB_OUTPUT
            if [ "$FIXES" != "0" ]; then
              echo "🔧 **${FIXES} 件のフォームマッピングを自動修正しました。**" >> $GITHUB_OUTPUT
            else
              echo '✅ フォーム番号突合OK（修正なし）' >> $GITHUB_OUTPUT
            fi
            if [ "$UNFIXABLE" != "0" ]; then
              echo '⚠️ **自動修正できない不整合があります。** ローカルで `npm run verify:forms` を実行して確認してください。' >> $GITHUB_OUTPUT
            fi
            # 差分のみ表示（AUTO-FIX / UNFIXABLE）
            DIFF_LINES=$(echo "$VERIFY_OUTPUT" | grep -E "^\s*\[(AUTO-FIX|UNFIXABLE)" | head -30)
            if [ -n "$DIFF_LINES" ]; then
              echo '```' >> $GITHUB_OUTPUT
              echo "$DIFF_LINES" >> $GITHUB_OUTPUT
              echo '```' >> $GITHUB_OUTPUT
            fi
            echo 'FORMSECTION' >> $GITHUB_OUTPUT
          fi

      - name: Update master data
        if: steps.master_check.outputs.has_master_changes == 'true'
        run: |
          echo "=== マスターデータ更新 ==="
          npm run generate:master -- --non-interactive

      - name: Update English names and check changes
        id: en_names
        run: |
          echo "=== 英語名取得（PokeAPI）==="

          # 月1日のスケジュール or 手動で --refresh 指定時は全件再取得
          DAY_OF_MONTH=$(date -u +%d)
          REFRESH_REQUESTED="${{ github.event.inputs.refresh_en_names }}"

          if [ "$DAY_OF_MONTH" = "01" ] || [ "$REFRESH_REQUESTED" = "true" ]; then
            echo "全件再取得モード（--refresh）"
            EN_OUTPUT=$(npm run generate:pokemon-en-names -- --refresh 2>&1)
          else
            echo "通常モード（キャッシュ利用）"
            EN_OUTPUT=$(npm run generate:pokemon-en-names 2>&1)
          fi
          EN_EXIT_CODE=$?
          echo "$EN_OUTPUT"

          # 英語名取得が失敗した場合は中断
          if [ $EN_EXIT_CODE -ne 0 ]; then
            echo "❌ 英語名取得に失敗しました"
            echo "en_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "en_success=true" >> $GITHUB_OUTPUT

          # 変更があるかチェック（[SUMMARY]行をパース）
          if echo "$EN_OUTPUT" | grep -q "\[SUMMARY\] has_changes=true"; then
            echo "has_en_changes=true" >> $GITHUB_OUTPUT
            echo "英語名変更あり"
          else
            echo "has_en_changes=false" >> $GITHUB_OUTPUT
            echo "英語名変更なし"
          fi

          # サマリーを保存（追加/変更/削除の行 + 個別ポケモン名）
          echo 'en_summary<<EOF' >> $GITHUB_OUTPUT
          echo "$EN_OUTPUT" | grep -E "^(✅|📝|🗑️|変更なし|   #)" | head -50 >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Check if any changes exist
        id: final_check
        run: |
          MASTER_CHANGES="${{ steps.master_check.outputs.has_master_changes }}"
          EN_CHANGES="${{ steps.en_names.outputs.has_en_changes }}"
          FORM_FIXES="${{ steps.form_verify.outputs.form_fixes }}"

          echo "Master changes: $MASTER_CHANGES"
          echo "EN names changes: $EN_CHANGES"
          echo "Form fixes: $FORM_FIXES"

          if [ "$MASTER_CHANGES" = "true" ] || [ "$EN_CHANGES" = "true" ] || [ "$FORM_FIXES" != "0" ]; then
            echo "has_any_changes=true" >> $GITHUB_OUTPUT
            echo "変更あり → PR作成"
          else
            echo "has_any_changes=false" >> $GITHUB_OUTPUT
            echo "変更なし → PR作成スキップ"
          fi


      # テスト設定（test-config.json の latestPokemon.name）は
      # generate-pokemon-master.mjs 内で追加ポケモン検出時に自動更新される

      - name: Build
        if: steps.final_check.outputs.has_any_changes == 'true'
        run: npm run build

      - name: Create Pull Request
        if: steps.final_check.outputs.has_any_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: ポケモンマスターデータ自動更新"
          title: "🎄 ポケモンマスターデータ自動更新"
          body: |
            ## 自動更新: ポケモンマスターデータ

            このPRはGitHub Actionsにより自動生成されました。

            ### 変更内容（マスターデータ）
            ```
            ${{ steps.master_check.outputs.master_summary }}
            ```

            ### 変更内容（英語名）
            ```
            ${{ steps.en_names.outputs.en_summary }}
            ```

            ${{ steps.form_verify.outputs.form_pr_section }}

            ### ⚠️ 確認事項
            - 600族・準伝・幻 (900/1080/1320) は手動で修正してください
            - リージョンフォーム名がある場合は英訳を確認してください

            ### 手動修正が必要な場合
            1. このPRをローカルにチェックアウト
            2. `npm run generate:master` を対話モードで実行し、expType を設定
            3. コミット & プッシュ

            ---
            *Generated by [Auto Update Pokemon Data](.github/workflows/auto-update-pokemon.yml)*
          branch: auto-update/pokemon-data
          delete-branch: true
          labels: |
            automated
            data-update

      - name: Fail if unfixable form errors exist
        if: steps.form_verify.outputs.form_errors == 'true'
        run: |
          echo "❌ 自動修正できないフォーム番号の不整合があります。"
          echo "   ローカルで 'npm run verify:forms' を実行して詳細を確認してください。"
          exit 1
